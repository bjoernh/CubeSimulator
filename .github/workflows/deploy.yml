name: Build, Release & Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-test-package:
    name: Build, Test & Package
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build production assets
        run: npm run build

      - name: Zip package for deployment
        # Creates a zip of the dist folder contents for the "Ready to Deploy" package
        run: |
          cd dist
          zip -r ../../CubeWebapp-Build.zip .
          echo "Package created at CubeWebapp-Build.zip"

      - name: Upload Build Artifact (Zip)
        uses: actions/upload-artifact@v4
        with:
          name: CubeWebapp-Package
          path: CubeWebapp-Build.zip
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: CubeWebapp-Build.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build-test-package
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
