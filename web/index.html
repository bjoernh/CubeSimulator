<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEDCube Simulator</title>
  <meta name="description"
    content="Browser-based 3D LED Cube Simulator — connect to a running MatrixServer to visualize your LED matrix software in real time." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #20252f;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #scene-canvas {
      display: block;
      width: 100vw !important;
      height: 100vh !important;
    }

    /* ── Header Title ─────────────────────────────────────────── */
    #header-title {
      position: fixed;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffffff;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.02em;
      pointer-events: none;
      z-index: 100;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
      background: rgba(17, 21, 30, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 12px 24px;
      border-radius: 12px;
    }

    #header-title span {
      background: linear-gradient(135deg, #4a90d9, #8bbef2);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }

    /* ── Connection Panel ─────────────────────────────────────── */
    #connection-panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(17, 21, 30, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 10px 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      z-index: 100;
    }

    #connection-panel label {
      color: rgba(255, 255, 255, 0.55);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #ws-url {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: #e8eaf0;
      font-family: 'Inter', monospace;
      font-size: 13px;
      padding: 6px 12px;
      width: 260px;
      outline: none;
      transition: border-color 0.2s;
    }

    #ws-url:focus {
      border-color: rgba(99, 179, 237, 0.6);
    }

    #connect-btn {
      background: linear-gradient(135deg, #4a90d9, #2d6db8);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 18px;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    #connect-btn:hover {
      opacity: 0.88;
    }

    #connect-btn:active {
      transform: scale(0.97);
    }

    /* Status badge */
    .status {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .status.disconnected {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.4);
    }

    .status.connecting {
      background: rgba(255, 200, 30, 0.18);
      color: #f6c90e;
    }

    .status.connected {
      background: rgba(52, 211, 153, 0.18);
      color: #34d399;
    }

    .status.error {
      background: rgba(239, 68, 68, 0.18);
      color: #ef4444;
    }
  </style>
</head>

<body>
  <!-- Title -->
  <h1 id="header-title">LEDCube <span>Simulator</span></h1>

  <!-- Connection Panel -->
  <div id="connection-panel">
    <label for="ws-url">MatrixServer</label>
    <input id="ws-url" type="text" value="ws://localhost:1337" placeholder="ws://192.168.1.100:1337" autocomplete="off"
      spellcheck="false" />
    <button id="connect-btn">Connect</button>
    <span id="connection-status" class="status disconnected">DISCONNECTED</span>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
